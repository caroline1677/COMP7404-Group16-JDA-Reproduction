<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JDA 复现结果 - COMP7404 Group16</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #e8e8e8;
      padding: 2rem;
    }
    .container { max-width: 900px; margin: 0 auto; }
    header {
      text-align: center;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #00d9ff; }
    .author { opacity: 0.8; font-size: 0.95rem; }
    .repo-link { margin-top: 0.5rem; }
    .repo-link a { color: #00d9ff; text-decoration: none; }
    .repo-link a:hover { text-decoration: underline; }
    section {
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #00d9ff; }
    .chart-wrap { height: 280px; margin-bottom: 1rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td { padding: 0.6rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
    th { background: rgba(0,217,255,0.15); color: #00d9ff; }
    .method { text-align: left; font-weight: 500; }
    .paper { color: #ffb347; }
    .ours { color: #7bed9f; }
    .diff { font-size: 0.85rem; }
    .diff.positive { color: #7bed9f; }
    .diff.negative { color: #ff6b6b; }
    .qr-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem;
    }
    #qrcode { background: #fff; padding: 12px; border-radius: 8px; }
    .qr-url { font-size: 0.85rem; word-break: break-all; color: #00d9ff; }
    .qr-hint { font-size: 0.9rem; opacity: 0.8; }
    footer { text-align: center; margin-top: 2rem; opacity: 0.6; font-size: 0.85rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>COMP7404 Group16 JDA</h1>
      <p class="author">作者：quziqi | GitHub: quziqi77777-lgtm</p>
      <p class="repo-link">
        <a href="https://github.com/caroline1677/COMP7404-Group16-JDA-Reproduction" target="_blank">仓库链接</a>
      </p>
    </header>

    <section>
      <h2>MNIST ↔ USPS 准确率对比</h2>
      <p style="margin-bottom:1rem;opacity:0.9;font-size:0.9rem;">论文数据 vs 复现结果（多 seed 平均）</p>
      <div class="chart-wrap">
        <canvas id="chart"></canvas>
      </div>
    </section>

    <section>
      <h2>详细数据表</h2>
      <table>
        <thead>
          <tr>
            <th>任务</th>
            <th>Method</th>
            <th>论文 (%)</th>
            <th>复现 (%)</th>
            <th>差异</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>

    <section class="qr-section">
      <h2>扫码访问</h2>
      <p class="qr-hint">部署后扫码即可分享本页 · 右键保存二维码图片</p>
      <div id="qrcode"></div>
      <p class="qr-url" id="currentUrl"></p>
      <button id="downloadQr" style="margin-top:0.5rem;padding:0.5rem 1rem;background:#00d9ff;color:#1a1a2e;border:none;border-radius:6px;cursor:pointer;font-weight:600;">下载二维码</button>
    </section>

    <footer>
      JDA: Transfer Feature Learning with Joint Distribution Adaptation (Long et al., ICCV 2013)
    </footer>
  </div>

  <script>
    const config = {
      title: 'COMP7404 Group16 JDA',
      author: 'quziqi',
      github: 'quziqi77777-lgtm',
      repoUrl: 'https://github.com/caroline1677/COMP7404-Group16-JDA-Reproduction'
    };

    const data = {
      'MNIST → USPS': {
        paper: { NN: 65.94, PCA: 66.22, GFK: 67.22, TCA: 56.28, TSL: 66.06, JDA: 67.28 },
        ours: { NN: 61.64, PCA: 61.61, GFK: 60.17, TCA: 55.75, TSL: 56.17, JDA: 60.84 }
      },
      'USPS → MNIST': {
        paper: { NN: 44.70, PCA: 44.95, GFK: 46.45, TCA: 51.05, TSL: 53.75, JDA: 59.65 },
        ours: { NN: 24.95, PCA: 23.58, GFK: 26.68, TCA: 40.98, TSL: 40.43, JDA: 34.53 }
      }
    };

    const methods = ['NN', 'PCA', 'GFK', 'TCA', 'TSL', 'JDA'];

    function renderTable() {
      const tbody = document.getElementById('tableBody');
      let html = '';
      for (const [task, vals] of Object.entries(data)) {
        for (const m of methods) {
          const p = vals.paper[m];
          const o = vals.ours[m];
          const diff = (o - p).toFixed(2);
          const diffClass = diff >= 0 ? 'positive' : 'negative';
          const diffStr = diff >= 0 ? `+${diff}` : diff;
          html += `<tr>
            <td>${task}</td>
            <td class="method">${m}</td>
            <td class="paper">${p.toFixed(2)}</td>
            <td class="ours">${o.toFixed(2)}</td>
            <td class="diff ${diffClass}">${diffStr}%</td>
          </tr>`;
        }
      }
      tbody.innerHTML = html;
    }

    function renderChart() {
      const ctx = document.getElementById('chart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: methods,
          datasets: [
            {
              label: 'MNIST→USPS 论文',
              data: methods.map(m => data['MNIST → USPS'].paper[m]),
              backgroundColor: 'rgba(255,179,71,0.7)',
              borderColor: '#ffb347',
              borderWidth: 1
            },
            {
              label: 'MNIST→USPS 复现',
              data: methods.map(m => data['MNIST → USPS'].ours[m]),
              backgroundColor: 'rgba(123,237,159,0.7)',
              borderColor: '#7bed9f',
              borderWidth: 1
            },
            {
              label: 'USPS→MNIST 论文',
              data: methods.map(m => data['USPS → MNIST'].paper[m]),
              backgroundColor: 'rgba(255,107,107,0.7)',
              borderColor: '#ff6b6b',
              borderWidth: 1
            },
            {
              label: 'USPS→MNIST 复现',
              data: methods.map(m => data['USPS → MNIST'].ours[m]),
              backgroundColor: 'rgba(0,217,255,0.5)',
              borderColor: '#00d9ff',
              borderWidth: 1
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top' }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 80,
              grid: { color: 'rgba(255,255,255,0.1)' },
              ticks: { color: '#e8e8e8' }
            },
            x: {
              grid: { color: 'rgba(255,255,255,0.1)' },
              ticks: { color: '#e8e8e8' }
            }
          }
        }
      });
    }

    let qrDataUrl = '';
    function renderQR() {
      const url = window.location.href;
      document.getElementById('currentUrl').textContent = url;
      const qrEl = document.getElementById('qrcode');
      qrEl.innerHTML = '';
      QRCode.toDataURL(url, { width: 180, margin: 2 }, (err, dataUrl) => {
        if (!err) {
          qrDataUrl = dataUrl;
          const img = document.createElement('img');
          img.src = dataUrl;
          img.alt = 'QR Code';
          qrEl.appendChild(img);
        }
      });
      document.getElementById('downloadQr').onclick = () => {
        if (qrDataUrl) {
          const a = document.createElement('a');
          a.href = qrDataUrl;
          a.download = 'jda-results-qrcode.png';
          a.click();
        }
      };
    }

    renderTable();
    renderChart();
    renderQR();
  </script>
</body>
</html>
